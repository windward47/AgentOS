<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haru</title>
<!-- Cubism 5 Core (WASM) — sync load before any module -->
<script src="/live2d/live2dcubismcore.min.js"></script>
<script>
  // Cubism 2 runtime stubs — pixi-live2d-display checks for these globals
  // even when using Cubism 4 models. No-op stubs prevent ReferenceError.
  (function() {
    function Stub() {}
    function StubMotion() { this.updateParam = Stub; }
    StubMotion.prototype.updateParam = Stub;
    var stubProto = { updateParam: Stub };
    var noop = function() {}, stubNull = function() { return null; };
    window.Live2D = {
      getError: function() { return ''; },
      dispose: noop,
      Live2DModelWebGL: Stub,
      Live2DMotion: StubMotion,
      MotionQueueManager: function() { this.startMotion = noop; },
      PhysicsHair: { create: stubNull, updateParam: noop, Src: { SRC_TO_X: 'x', SRC_TO_Y: 'y', SRC_TO_G_ANGLE: 'angle' } },
      Live2DExpression: StubMotion,
      AMotion: StubMotion,
    };
    window.Live2DMotion = StubMotion;
    window.Live2DExpression = StubMotion;
    window.L2DPhysicsHair = { create: stubNull };
    window.PhysicsHair = { Src: { SRC_TO_X: 'x', SRC_TO_Y: 'y', SRC_TO_G_ANGLE: 'angle' }, Target: { TARGET_FROM_ANGLE: 'angle', TARGET_FROM_ANGLE_V: 'angle_v' } };
    window.MotionQueueManager = function() { this.startMotion = noop; };
    window.AMotion = StubMotion;
  })();
</script>
<style>
  html, body, #root { margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);user-select:none; }
  #drag-bar { position:fixed;top:0;left:0;right:0;height:28px;z-index:999;cursor:grab; }
  #drag-bar:active { cursor:grabbing; }
  #ctx-menu { position:fixed;z-index:9999;background:rgba(30,30,40,0.95);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:4px;min-width:100px;display:none;backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(0,0,0,0.4); }
  #ctx-menu button { display:block;width:100%;padding:6px 12px;border:none;background:none;color:#e0e0e0;font-size:13px;text-align:left;cursor:pointer;border-radius:5px; }
  #ctx-menu button:hover { background:rgba(255,255,255,0.1); }
</style>
</head>
<body>
<div id="drag-bar"></div>
<div id="ctx-menu"><button onclick="closeWindow()">Close Window</button></div>
<div id="root"></div>
<script type="module" src="./src/avatar/main.ts"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haru</title>
<style>
  html, body, #root { margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);user-select:none; }
  #drag-bar { position:fixed;top:0;left:0;right:0;height:28px;z-index:999;cursor:grab; }
  #drag-bar:active { cursor:grabbing; }
  #ctx-menu { position:fixed;z-index:9999;background:rgba(30,30,40,0.95);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:4px;min-width:100px;display:none;backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(0,0,0,0.4); }
  #ctx-menu button { display:block;width:100%;padding:6px 12px;border:none;background:none;color:#e0e0e0;font-size:13px;text-align:left;cursor:pointer;border-radius:5px; }
  #ctx-menu button:hover { background:rgba(255,255,255,0.1); }

  .char { width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative; }
  .body-wrap { position:relative;animation:float 3.5s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .shadow { width:50px;height:6px;background:rgba(255,255,255,.15);border-radius:50%;margin-top:6px;animation:shadowPulse 3.5s ease-in-out infinite; }
  @keyframes shadowPulse { 0%,100%{transform:scaleX(1);opacity:.5} 50%{transform:scaleX(.75);opacity:.15} }

  .hair-group { position:absolute;top:-22px;left:50%;transform:translateX(-50%);z-index:3; }
  .hair-back { width:130px;height:90px;background:linear-gradient(180deg,#8b6fbf 0%,#7a5fb0 50%,#9d84d4 100%);border-radius:90px 90px 0 0;position:relative; }
  .hair-back::before { content:'';position:absolute;width:20px;height:40px;background:#9d84d4;border-radius:0 0 12px 12px;left:18px;top:45px;transform:rotate(-5deg); }
  .hair-back::after { content:'';position:absolute;width:18px;height:46px;background:#9d84d4;border-radius:0 0 10px 10px;right:14px;top:40px;transform:rotate(5deg); }
  .hair-bangs { width:110px;height:38px;background:linear-gradient(180deg,#9d84d4 0%,#8b6fbf 100%);border-radius:0 0 60px 60px;position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:4; }
  .hair-bangs::before { content:'';position:absolute;width:12px;height:18px;background:#b09ae0;border-radius:0 0 6px 6px;left:22px;top:26px; }
  .hair-bangs::after { content:'';position:absolute;width:10px;height:22px;background:#b09ae0;border-radius:0 0 5px 5px;right:26px;top:24px; }

  .head { width:100px;height:90px;background:linear-gradient(180deg,#fff9f5 0%,#ffe8db 100%);border-radius:50%;position:relative;box-shadow:inset 0 -3px 10px rgba(220,160,130,.25),0 2px 8px rgba(0,0,0,.1); }
  .ear { width:16px;height:20px;background:#ffede0;border-radius:50%;position:absolute;top:38px; }
  .ear.l { left:-10px; }
  .ear.r { right:-10px; }
  .ear::after { content:'';width:8px;height:10px;background:rgba(220,160,140,.3);border-radius:50%;position:absolute;top:4px;left:4px; }

  .brow { width:20px;height:3px;background:#8b6fbf;border-radius:2px;position:absolute;top:26px; }
  .brow.l { left:19px; }
  .brow.r { right:19px; }

  .eye-wrap { position:absolute;top:34px;width:12px;height:14px;overflow:hidden; }
  .eye-wrap.l { left:23px; }
  .eye-wrap.r { right:23px; }
  .eye { width:12px;height:14px;background:radial-gradient(ellipse at 50% 40%,#4a3528 0%,#2a1a10 100%);border-radius:50%;animation:blink 4s ease-in-out infinite; }
  @keyframes blink { 0%,90%,100%{transform:scaleY(1)} 93%{transform:scaleY(.04)} 96%{transform:scaleY(1)} }
  .pupil { width:4px;height:4px;background:#fff;border-radius:50%;position:absolute;top:5px;left:3px; }
  .pupil-hi { width:2px;height:2px;background:#fff;border-radius:50%;position:absolute;top:3px;left:6px; }

  .nose { width:6px;height:4px;background:rgba(210,155,130,.5);border-radius:50%;position:absolute;top:50px;left:50%;transform:translateX(-50%); }

  .mouth-wrap { position:absolute;top:62px;left:50%;transform:translateX(-50%); }
  .mouth { width:18px;height:8px;background:#e0705c;border-radius:0 0 9px 9px;transition:all .08s ease; }
  .mouth-top { width:12px;height:3px;background:#e87a6a;border-radius:6px 6px 0 0;position:absolute;top:-2px;left:3px; }

  .blush { width:12px;height:6px;background:rgba(255,140,120,.3);border-radius:50%;position:absolute;top:54px; }
  .blush.l { left:12px; }
  .blush.r { right:12px; }

  .torso { width:72px;height:62px;background:linear-gradient(180deg,#7c5cbf 0%,#6b4c9a 35%,#5b3a8c 100%);border-radius:12px 12px 18px 18px;margin:-6px auto 0;position:relative; }
  .collar { width:44px;height:7px;background:#fff;border-radius:3px;position:absolute;top:8px;left:50%;transform:translateX(-50%); }
  .bow { width:20px;height:12px;position:absolute;top:1px;left:50%;transform:translateX(-50%); }
  .bow::before,.bow::after { content:'';width:11px;height:7px;background:#ff6b8a;border-radius:50%;position:absolute;top:0; }
  .bow::before { left:0;transform:rotate(-15deg); }
  .bow::after { right:0;transform:rotate(15deg); }
  .bow .knot { width:5px;height:5px;background:#ff4466;border-radius:50%;position:absolute;top:3px;left:50%;transform:translateX(-50%);z-index:1; }

  .status { position:absolute;bottom:6px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.25);font-size:9px;font-family:monospace; }
</style>
<!-- Cubism 5 Core (WASM) — sync load before any module -->
<script src="/live2d/live2dcubismcore.min.js"></script>
</head>
<body>
<div id="drag-bar"></div>
<div id="ctx-menu"><button onclick="closeWindow()">Close Window</button></div>
<div id="root">
  <div class="char">
    <div class="body-wrap">
      <div class="hair-group">
        <div class="hair-back"></div>
        <div class="hair-bangs" id="bangs"></div>
      </div>
      <div class="head" id="head">
        <div class="ear l"></div><div class="ear r"></div>
        <div class="brow l" id="browL"></div><div class="brow r" id="browR"></div>
        <div class="eye-wrap l"><div class="eye"><div class="pupil"></div><div class="pupil-hi"></div></div></div>
        <div class="eye-wrap r"><div class="eye"><div class="pupil"></div><div class="pupil-hi"></div></div></div>
        <div class="nose"></div>
        <div class="mouth-wrap"><div class="mouth-top"></div><div class="mouth" id="mouth"></div></div>
        <div class="blush l"></div><div class="blush r"></div>
      </div>
      <div class="torso">
        <div class="collar"></div>
        <div class="bow"><div class="knot"></div></div>
      </div>
    </div>
    <div class="shadow"></div>
    <div class="status">Haru · Cubism 5</div>
  </div>
</div>

<script type="module" src="./src/avatar/main.ts"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Avatar</title>
<style>
  html, body, #root { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:transparent; }
  #drag-bar { position:fixed; top:0; left:0; right:0; height:28px; z-index:999; cursor:grab; background:transparent; }
  #drag-bar:active { cursor:grabbing; }
  #ctx-menu { position:fixed; z-index:9999; background:rgba(30,30,40,0.95); border:1px solid rgba(255,255,255,0.12); border-radius:8px; padding:4px; min-width:100px; display:none; backdrop-filter:blur(12px); box-shadow:0 4px 16px rgba(0,0,0,0.4); }
  #ctx-menu button { display:block; width:100%; padding:6px 12px; border:none; background:none; color:#e0e0e0; font-size:13px; text-align:left; cursor:pointer; border-radius:5px; }
  #ctx-menu button:hover { background:rgba(255,255,255,0.1); }
</style>
<div id="drag-bar"></div>
<div id="ctx-menu"><button onclick="closeWindow()">Close Window</button></div>
<script src="/live2d/live2dcubismcore.min.js"></script>
<script>
  function Stub(){}
  Stub.prototype.updateParam=function(){};
  var noop=function(){}, stubC=function(){return null};
  var PhStub={Src:{SRC_TO_X:'x',SRC_TO_Y:'y',SRC_TO_G_ANGLE:'angle'}};
  window.Live2DMotion=Stub;window.AMotion=Stub;window.Live2DExpression=Stub;
  window.MotionQueueManager=function(){this.startMotion=noop};
  window.PhysicsHair=PhStub;window.L2DPhysicsHair={create:stubC};
  window.Live2D={getError:function(){return''},dispose:noop,Live2DModelWebGL:Stub,Live2DMotion:Stub,MotionQueueManager:window.MotionQueueManager,PhysicsHair:PhStub,AMotion:Stub,Live2DExpression:Stub};
</script>
<script type="module" crossorigin src="/avatar-agent/assets/index-CeOofDrQ.js"></script>
<link rel="stylesheet" crossorigin href="/avatar-agent/assets/index-x-ty9mcd.css">
</head>
<body>
<div id="root"></div>

<script type="module">
// Tauri window controls
import('/tauri-api/window.js').then(function(m) {
  var win = m.getCurrentWindow();
  document.getElementById('drag-bar').addEventListener('mousedown', function(e) { if(e.button===0) win.startDragging(); });
  window.closeWindow = function() { win.close(); };
}).catch(function() {});

document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  var c = document.getElementById('ctx-menu');
  c.style.left = Math.min(e.clientX, innerWidth - 110) + 'px';
  c.style.top = Math.min(e.clientY, innerHeight - 50) + 'px';
  c.style.display = 'block';
});
document.addEventListener('click', function() {
  var c = document.getElementById('ctx-menu');
  if (c) c.style.display = 'none';
});

// ── Lip sync: poll get_lip_level via Rust IPC ──
var lipSmooth = 0, lipTimer = 0;
var invokeFn = null;

// Get invoke from Tauri API
import('/tauri-api/core.js').then(function(m) {
  invokeFn = m.invoke;
}).catch(function() {});

function lipTick() {
  // Poll Rust state every 50ms
  if (invokeFn) {
    invokeFn('get_lip_level').then(function(level) {
      var target = level * 1.8;
      var speed = target > lipSmooth ? 0.3 : 0.12;
      lipSmooth += (target - lipSmooth) * speed;
      if (window.__live2d && window.__live2d.setParam) {
        window.__live2d.setParam('mouthOpen', lipSmooth);
      }
    }).catch(function() {});
  }
  lipTimer = requestAnimationFrame(lipTick);
}
lipTick();
</script>
</body>
</html>
